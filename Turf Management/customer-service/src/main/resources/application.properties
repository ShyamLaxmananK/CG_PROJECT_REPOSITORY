# =========================
# ACTIVE PROFILE
# =========================

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# =========================
# SERVER CONFIG
# =========================

server.port=${SERVER_PORT:8081}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.application.name=CUSTOMER-SERVICE


# =========================
# MYSQL DATABASE CONFIG
# =========================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/customerdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}


# =========================
# JPA CONFIG
# =========================

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}


# =========================
# EUREKA CONFIG
# =========================

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true


# =========================
# FEIGN CLIENT CONFIG
# =========================

feign.hystrix.enabled=false
feign.client.config.default.connectTimeout=${FEIGN_CONNECT_TIMEOUT:5000}
feign.client.config.default.readTimeout=${FEIGN_READ_TIMEOUT:5000}


# =========================
# JWT SECRET
# =========================

jwt.secret=${JWT_SECRET}


# =========================
# LOGGING CONFIG
# =========================

logging.file.name=${LOG_FILE:logs/customer-service.log}
logging.level.root=${ROOT_LOG_LEVEL:INFO}
logging.level.org.springframework.web=${SPRING_WEB_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}

logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n


# =========================
# ACTUATOR CONFIG
# =========================

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS:health,info}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_DETAILS:when_authorized}
management.info.env.enabled=false
management.info.java.enabled=true
management.info.os.enabled=true


# =========================
# SWAGGER CONFIG
# =========================

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}


# =========================
# APPLICATION INFO
# =========================

info.app.name=Customer Service
info.app.description=Turf Management Customer Microservice
info.app.version=1.0
info.app.owner=Rishabh
