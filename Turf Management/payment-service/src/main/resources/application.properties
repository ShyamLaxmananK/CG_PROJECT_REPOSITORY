# =========================
# ACTIVE PROFILE
# =========================

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}


# =========================
# SERVER CONFIG
# =========================

server.port=${SERVER_PORT:8084}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.application.name=PAYMENT-SERVICE


# =========================
# MYSQL DATABASE CONFIG
# =========================

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/paymentdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}


# =========================
# JPA CONFIG
# =========================

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}


# =========================
# EUREKA CONFIG
# =========================

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true


# =========================
# ASYNC THREAD CONFIG
# =========================

spring.task.execution.pool.core-size=${ASYNC_CORE_SIZE:5}
spring.task.execution.pool.max-size=${ASYNC_MAX_SIZE:10}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE_CAPACITY:50}


# =========================
# LOGGING CONFIG
# =========================

logging.file.name=${LOG_FILE:logs/payment-service.log}
logging.level.root=${ROOT_LOG_LEVEL:INFO}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n


# =========================
# ACTUATOR CONFIG
# =========================

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS:health,info}
management.endpoint.health.show-details=${MANAGEMENT_HEALTH_DETAILS:when_authorized}
management.info.env.enabled=false
management.info.java.enabled=true
management.info.os.enabled=true


# =========================
# SWAGGER CONFIG
# =========================

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}


# =========================
# APPLICATION INFO
# =========================

info.app.name=Payment Service
info.app.description=Turf Management Payment Microservice
info.app.version=1.0
info.app.owner=Rishabh


# =========================
# PAYMENT PROVIDER CONFIG
# =========================

payment.provider=${PAYMENT_PROVIDER:MOCK}
payment.currency=${PAYMENT_CURRENCY:INR}
payment.razorpay.key-id=${RAZORPAY_KEY_ID:}
payment.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
